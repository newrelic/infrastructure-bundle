name: Vulnerability Scan Daily
on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    name: Build and scan image
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ci
      TRIVY_DISABLE_VEX_NOTICE: "true"
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download integrations
        run: go run downloader.go

      - name: Build and load docker image
        run: |
          DOCKER_PLATFORMS=linux/amd64 ./docker-build.sh . --load

# ... (previous steps: checkout, setup-go, build docker image) ...

      - name: Create Scan Template
        run: |
          cat << 'EOF' > scan.tpl
          {{- range . -}}
          {{- $target := .Target -}}
          {{- range .Vulnerabilities -}}
          {{ $target }} | {{ .PkgName }} | {{ .VulnerabilityID }} | {{ .Severity }} | {{ .FixedVersion }}
          {{ end -}}
          {{- end -}}
          EOF

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}
          format: 'template'
          template: '@scan.tpl'
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          vuln-type: 'os,library'
          output: "trivy-report.txt"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Run Grype Scan
        uses: anchore/scan-action@main
        id: grype
        with:
          image: "${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}"
          fail-build: false
          severity-cutoff: low
          only-fixed: true
          output-format: json # Use JSON for raw data

      - name: Run Trivy Scan - k8s-events-forwarder
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "docker.io/newrelic/k8s-events-forwarder:latest"
          format: 'template'
          template: '@scan.tpl'
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          vuln-type: 'os,library'
          output: "trivy-k8s-events-forwarder.txt"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Run Grype Scan - k8s-events-forwarder
        uses: anchore/scan-action@main
        id: grype-k8s-events
        with:
          image: "docker.io/newrelic/k8s-events-forwarder:latest"
          fail-build: false
          severity-cutoff: low
          only-fixed: true
          output-format: json

      - name: Run Trivy Scan - nri-forwarder
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "docker.io/newrelic/nri-forwarder:latest"
          format: 'template'
          template: '@scan.tpl'
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          vuln-type: 'os,library'
          output: "trivy-nri-forwarder.txt"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Run Grype Scan - nri-forwarder
        uses: anchore/scan-action@main
        id: grype-nri-forwarder
        with:
          image: "docker.io/newrelic/nri-forwarder:latest"
          fail-build: false
          severity-cutoff: low
          only-fixed: true
          output-format: json

      - name: Convert Grype to Table Format & Merge
        run: |
          # 1. Use jq to convert Grype JSON to the same format: Target | Pkg | CVE | Severity | Fixed
          # Infrastructure Bundle
          jq -r '.matches[] | "\(.artifact.locations[0].path) | \(.artifact.name) | \(.vulnerability.id) | \(.vulnerability.severity | ascii_upcase) | \(.vulnerability.fix.versions[0] // "n/a")"' ${{ steps.grype.outputs.json }} > grype-report.txt || touch grype-report.txt
          
          # k8s-events-forwarder
          jq -r '.matches[] | "\(.artifact.locations[0].path) | \(.artifact.name) | \(.vulnerability.id) | \(.vulnerability.severity | ascii_upcase) | \(.vulnerability.fix.versions[0] // "n/a")"' ${{ steps.grype-k8s-events.outputs.json }} > grype-k8s-events-forwarder.txt || touch grype-k8s-events-forwarder.txt
          
          # nri-forwarder
          jq -r '.matches[] | "\(.artifact.locations[0].path) | \(.artifact.name) | \(.vulnerability.id) | \(.vulnerability.severity | ascii_upcase) | \(.vulnerability.fix.versions[0] // "n/a")"' ${{ steps.grype-nri-forwarder.outputs.json }} > grype-nri-forwarder.txt || touch grype-nri-forwarder.txt

          # 2. Merge all reports
          cat trivy-report.txt grype-report.txt trivy-k8s-events-forwarder.txt grype-k8s-events-forwarder.txt trivy-nri-forwarder.txt grype-nri-forwarder.txt > combined-raw.txt
          
          # 3. Clean up the paths and de-duplicate unique CVEs per integration
          # This ensures that if both find the same CVE in the same binary, we only count it once
          sed -i 's|var/db/newrelic-infra/newrelic-integrations/bin/||g' combined-raw.txt
          sort -u combined-raw.txt -o raw-report.txt

      - name: Format Slack Message
        id: format_message
        run: |
          # 1. Clean the report
          sed -i '/^[[:space:]]*$/d' raw-report.txt
          
          if [ -s raw-report.txt ]; then
             # --- LOGIC: GLOBAL COUNTS (Strictly Cleaned) ---
             # Count severity levels first
             CRIT_T=$(grep -c "CRITICAL" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             HIGH_T=$(grep -c "HIGH" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             MED_T=$(grep -c "MEDIUM" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             LOW_T=$(grep -c "LOW" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')

             # Fallback to 0 if variables are empty
             CRIT_T=${CRIT_T:-0}
             HIGH_T=${HIGH_T:-0}
             MED_T=${MED_T:-0}
             LOW_T=${LOW_T:-0}
             
             # Calculate total as sum of all severities
             TOTAL_CVE_COUNT=$((CRIT_T + HIGH_T + MED_T + LOW_T))
             
             # Count unique components with same normalization as aggregated table
             UNIQUE_INT_COUNT=$(cut -d'|' -f1 raw-report.txt | sed 's|.*/||;s/ //g' | grep -v '^$' | sort -u | wc -l | sed 's/[^0-9]//g')
             UNIQUE_INT_COUNT=${UNIQUE_INT_COUNT:-0}

             # --- LOGIC: PER-INTEGRATION AGGREGATION ---
             AGGREGATED_TABLE=$(awk -F'|' '
             {
                name = $1;
                gsub(/.*\//, "", name); gsub(/ /, "", name);
                sev = $4; gsub(/ /, "", sev);
                
                ints[name]++;
                if (sev == "CRITICAL") crit[name]++;
                else if (sev == "HIGH") high[name]++;
                else if (sev == "MEDIUM") med[name]++;
                else if (sev == "LOW") low[name]++;
             }
             END {
                for (i in ints) {
                   if (crit[i] > 0) icon = "🔴";
                   else if (high[i] > 0) icon = "🟠";
                   else if (med[i] > 0) icon = "🟡";
                   else icon = "🔵";
                   row_tot = (crit[i]+0) + (high[i]+0) + (med[i]+0) + (low[i]+0);
                   printf "%s %-12s | %2d | %2d | %2d | %2d | %3d\n", icon, substr(i,1,12), crit[i], high[i], med[i], low[i], row_tot
                }
             }' raw-report.txt | sort -r)

             # --- CONSTRUCT DASHBOARD ---
             {
               echo "SLACK_MESSAGE<<EOF"
               echo -e "*🛡️ SECURITY SCAN REPORT* | \`$(date +'%Y-%m-%d')\`"
               echo -e "*Multi-Engine:* _Trivy & Grype Combined_"
               echo -e "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
               echo -e "*📊 OVERALL POSTURE*"
               echo -e "• *Total Issues:* \`$TOTAL_CVE_COUNT\` findings across \`$UNIQUE_INT_COUNT\` components"
               echo -e "• *Critical:* 🔴 \`$CRIT_T\`  |  *High:* 🟠 \`$HIGH_T\`"
               echo -e "• *Medium:* 🟡 \`$MED_T\`  |  *Low:* 🔵 \`$LOW_T\`"
               echo -e "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
               echo -e "*🔎 FINDINGS BREAKDOWN:*"
               echo -e "\`\`\`"
               echo -e "ST  INTEGRATION  | CR | HI | ME | LO | TOT"
               echo -e "--- ------------ | -- | -- | -- | -- | ---"
               echo -e "$AGGREGATED_TABLE"
               echo -e "\`\`\`"
               echo -e "🔗 _Please find the GitHub Actions workflow run for more details:_"
               echo -e "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
               echo "EOF"
             } >> $GITHUB_OUTPUT
          else
             echo "SLACK_MESSAGE=*✅ SECURITY SCAN PASSED* - No issues detected." >> $GITHUB_OUTPUT
          fi

      - name: Display Report in Workflow Run
        run: |
          echo "=========================================="
          echo "🛡️ SECURITY SCAN REPORT | $(date +'%Y-%m-%d')"
          echo "Multi-Engine: Trivy & Grype Combined"
          echo "=========================================="
          echo ""
          
          if [ -s raw-report.txt ]; then
             # Display overall statistics
             # Count severity levels first
             CRIT_T=$(grep -c "CRITICAL" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             HIGH_T=$(grep -c "HIGH" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             MED_T=$(grep -c "MEDIUM" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')
             LOW_T=$(grep -c "LOW" raw-report.txt | head -n 1 | sed 's/[^0-9]//g')

             # Fallback to 0 if variables are empty
             CRIT_T=${CRIT_T:-0}
             HIGH_T=${HIGH_T:-0}
             MED_T=${MED_T:-0}
             LOW_T=${LOW_T:-0}
             
             # Calculate total as sum of all severities
             TOTAL_CVE_COUNT=$((CRIT_T + HIGH_T + MED_T + LOW_T))
             
             # Count unique components with same normalization as aggregated table
             UNIQUE_INT_COUNT=$(cut -d'|' -f1 raw-report.txt | sed 's|.*/||;s/ //g' | grep -v '^$' | sort -u | wc -l | sed 's/[^0-9]//g')
             UNIQUE_INT_COUNT=${UNIQUE_INT_COUNT:-0}

             echo "📊 OVERALL POSTURE:"
             echo "  • Total Issues: $TOTAL_CVE_COUNT findings across $UNIQUE_INT_COUNT components"
             echo "  • Critical: $CRIT_T | High: $HIGH_T | Medium: $MED_T | Low: $LOW_T"
             echo ""
             echo "=========================================="
             echo "🔎 DETAILED FINDINGS:"
             echo "=========================================="
             echo ""
             echo "Target | Package | CVE | Severity | Fixed Version"
             echo "-------|---------|-----|----------|---------------"
             cat raw-report.txt
             echo ""
             echo "=========================================="
          else
             echo "✅ No security issues detected!"
          fi

      - name: Send Slack notification
        uses: archive/github-actions-slack@master
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.COREINT_SLACK_TOKEN }}
          slack-channel: ${{ secrets.COREINT_SLACK_CHANNEL }}
          slack-text: ${{ steps.format_message.outputs.SLACK_MESSAGE }}
          slack-optional-parse: full