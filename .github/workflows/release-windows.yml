name: Windows release
on:
  workflow_dispatch:
    inputs:
      agent_version:
        description: "Agent version (e.g., 1.72.5)"
        required: true
      bundle_version:
        description: "Bundle version (e.g., 3.3.20)"
        required: true

jobs:
  release-windows-2022:
    name: Release Windows Server 2022
    runs-on: windows-x64-8-core
    env:
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ${{ github.event.inputs.bundle_version }}
      AGENT_VERSION: ${{ github.event.inputs.agent_version }}
      WINDOWS_VERSION: ltsc2022
      OUTDIR: out-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download integrations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run downloader.go -bundle="bundle-windows.yml" -outdir="out-windows"
      - name: Build Windows Server 2022 image
        run: bash ./docker-build-windows.sh
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}-${{ env.WINDOWS_VERSION }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}
      - name: Push Windows Server 2022 image
        run: bash ./docker-build-windows.sh --push

  release-windows-2019:
    name: Release Windows Server 2019
    runs-on: windows-x64-8-core
    env:
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ${{ github.event.inputs.bundle_version }}
      AGENT_VERSION: ${{ github.event.inputs.agent_version }}
      WINDOWS_VERSION: ltsc2019
      OUTDIR: out-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download integrations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run downloader.go -bundle="bundle-windows.yml" -outdir="out-windows"
      - name: Build Windows Server 2019 image
        run: bash ./docker-build-windows.sh
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}-${{ env.WINDOWS_VERSION }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}
      - name: Push Windows Server 2019 image
        run: bash ./docker-build-windows.sh --push
