---
name: Container build
on:
  push:
    branches:
      - master
      - main
      - renovate/**
  pull_request:

jobs:
  build:
    name: Build and scan image
    runs-on: ubuntu-latest
    env:  # Variables as understood by docker-build.sh
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ci
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download integrations
        run: go run downloader.go

      # Due to a limitation of buildx, multiarch images cannot be `--load`ed to the host
      # Therefore, to test vulnerabilities, we also re-build (fast with cache) for amd64 only and load it
      - name: Build docker image for all platforms
        run: |
          # Test build, but not load, for all archs
          ./docker-build.sh .
          # Build and load for amd64 only (for snyk)
          DOCKER_PLATFORMS=linux/amd64 ./docker-build.sh . --load

      - name: Check if CHANGELOG is valid
        uses: newrelic/release-toolkit/validate-markdown@v1

  build-fips:
    name: Build fips and scan image
    runs-on: ubuntu-latest
    env:  # Variables as understood by docker-build.sh
      DOCKER_IMAGE: newrelic/infrastructure-bundle-fips
      DOCKER_IMAGE_TAG: ci
      OUTDIR: out-fips
      BASE_IMAGE_NAME: newrelic/infrastructure-fips
      DOCKER_PLATFORMS: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download integrations
        run: go run downloader.go -bundle=bundle-fips.yml -outdir=out-fips

      # Due to a limitation of buildx, multiarch images cannot be `--load`ed to the host
      # Therefore, to test vulnerabilities, we also re-build (fast with cache) for amd64 only and load it
      - name: Build docker image for all platforms
        run: |
          # Test build, but not load, for all archs
          ./docker-build.sh .
          # Build and load for amd64 only (for snyk)
          DOCKER_PLATFORMS=linux/amd64 ./docker-build.sh . --load

      - name: Check if CHANGELOG is valid
        uses: newrelic/release-toolkit/validate-markdown@v1

  build-windows-2019:
    name: Build Windows 2019 image
    runs-on: windows-2019
    env:
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ci
      WINDOWS_VERSION: ltsc2019
    steps:
      - uses: actions/checkout@v4
      - name: Switch to Windows containers
        run: |
          Stop-Service docker -Force
          $configPath = "$env:ProgramData\docker\config\daemon.json"
          if (-not (Test-Path (Split-Path $configPath))) {
            New-Item -ItemType Directory -Force -Path (Split-Path $configPath) | Out-Null
          }
          Set-Content -Path $configPath -Value '{"experimental":true}'
          Start-Service docker
          Start-Sleep 5
        shell: pwsh
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Windows 2019 image
        shell: bash
        run: ./docker-build-windows.sh

  build-windows-2022:
    name: Build Windows 2022 image
    runs-on: windows-2022
    env:
      DOCKER_IMAGE: newrelic/infrastructure-bundle
      DOCKER_IMAGE_TAG: ci
      WINDOWS_VERSION: ltsc2022
    steps:
      - uses: actions/checkout@v4
      - name: Switch to Windows containers
        run: |
          Stop-Service docker -Force
          $configPath = "$env:ProgramData\docker\config\daemon.json"
          if (-not (Test-Path (Split-Path $configPath))) {
            New-Item -ItemType Directory -Force -Path (Split-Path $configPath) | Out-Null
          }
          Set-Content -Path $configPath -Value '{"experimental":true}'
          Start-Service docker
          Start-Sleep 5
        shell: pwsh
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Windows 2022 image
        shell: bash
        run: ./docker-build-windows.sh
